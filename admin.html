<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    padding:30px;
}
</style>
</head>

<body>

<h1>ADMIN PANEL 🔐</h1>

<div id="list"></div>

<script>
const supabaseUrl = "https://qarjoeeftvtrzoqyufgb.supabase.co";
const supabaseKey = "sb_publishable_-81q9wbD36UU-U9eBdP-AQ_wvgIUeHO";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function load(){
    let { data } = await supabase.from("users").select("*");

    let html = "";

    data.forEach(u=>{
        html += `
        <p>👤 ${u.username} | 🔑 ${u.password}</p>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

load();
</script>
