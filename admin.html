<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    padding:30px;
}
</style>
</head>

<body>

<h1>ADMIN 🔐</h1>

<div id="list"></div>

<script>
const supabaseUrl = "https://qarjoeeftvtrzoqyufgb.supabase.co";
const supabaseKey = "sb_publishable_-81q9wbD36UU-U9eBdP-AQ_wvgIUeHO";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

async function load(){
    const { data, error } = await supabaseClient
        .from("users")
        .select("*");

    if(error){
        document.body.innerHTML = "Erreur : " + error.message;
        return;
    }

    let html = "";

    data.forEach(u=>{
        html += `<p>👤 ${u.username} | 🔑 ${u.password}</p>`;
    });

    document.getElementById("list").innerHTML = html;
}

load();
</script>

</body>
</html>
